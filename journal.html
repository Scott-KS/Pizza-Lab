<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Pie Lab — Pizza Journal</title>
  <link rel="icon" type="image/svg+xml" href="assets/logos/favicon-32.svg">
  <link rel="apple-touch-icon" href="assets/logos/logo-monogram-512.svg">
  <meta property="og:image" content="assets/logos/logo-stacked.svg">
  <meta name="description" content="Pizza recipe calculator, dough scheduler, and baking journal.">
  <meta name="theme-color" content="#c0392b">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem("pielab-theme"),d=t==="dark"||(!t&&matchMedia("(prefers-color-scheme:dark)").matches);if(d){document.documentElement.dataset.theme="dark";var m=document.querySelector('meta[name="theme-color"]');if(m)m.content="#1a1a1a";}})()</script>
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body data-page="journal">

  <!-- Shared Navigation -->
  <header class="site-header">
    <nav class="site-nav">
      <a href="index.html" class="nav-logo">
        <img src="assets/logos/logo-horizontal.svg" alt="The Pie Lab" />
      </a>
      <div class="nav-links">
        <a href="calculator.html" class="nav-link" data-page="calculator">Make</a>
        <a href="schedule.html" class="nav-link" data-page="schedule">
          Schedule
          <span class="schedule-badge hidden"></span>
        </a>
        <a href="journal.html" class="nav-link" data-page="journal">Journal</a>
        <a href="learn.html" class="nav-link" data-page="learn">Learn</a>
        <a href="kitchen.html" class="nav-link" data-page="kitchen">My Kitchen</a>
      </div>
    </nav>
  </header>

  <main>
    <!-- Pizza Journal -->
    <section class="pizza-journal" id="pizza-journal">
      <h2>Pizza Journal</h2>

      <div class="journal-storage" id="journal-storage">
        <div class="storage-label" id="storage-label">Storage: calculating…</div>
        <div class="storage-bar"><div class="storage-bar-fill" id="storage-bar-fill"></div></div>
      </div>

      <div class="journal-toolbar">
        <div class="journal-search">
          <input type="search" id="journal-search-input" placeholder="Search bakes…" aria-label="Search journal entries" />
        </div>
        <div class="journal-filter">
          <label for="journal-style-filter">Filter by style:</label>
          <select id="journal-style-filter">
            <option value="all">All Styles</option>
          </select>
        </div>
        <div class="journal-sort">
          <label for="journal-sort-select">Sort:</label>
          <select id="journal-sort-select">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="hydration-high">Highest Hydration</option>
            <option value="hydration-low">Lowest Hydration</option>
            <option value="rating-high">Highest Rating</option>
            <option value="rating-low">Lowest Rating</option>
          </select>
        </div>
        <button class="btn-compare" id="btn-compare" disabled>Compare</button>
        <p class="compare-hint" id="compare-hint"></p>
      </div>

      <div class="journal-stats-section hidden" id="journal-stats-section">
        <button class="stats-toggle" id="stats-toggle" type="button">
          <span>Your Baking Stats</span>
          <span class="stats-toggle-arrow" id="stats-toggle-arrow">▼</span>
        </button>
        <div class="stats-grid" id="stats-grid"></div>
      </div>

      <div class="journal-form-wrapper hidden" id="journal-form-wrapper">
        <h3 id="journal-form-heading">Log a Bake</h3>
        <form id="journal-form">
          <div class="form-group">
            <label for="j-bake-name">Bake Name <span class="field-hint">(optional)</span></label>
            <input type="text" id="j-bake-name" placeholder="e.g. Sunday Night Margherita" maxlength="80" />
          </div>

          <div class="journal-form-grid">
            <div class="form-group">
              <label for="j-style">Pizza Style</label>
              <select id="j-style" required>
                <option value="" disabled selected>Select a style&hellip;</option>
              </select>
              <p id="j-style-history" class="style-history-note hidden"></p>
            </div>
            <div class="form-group">
              <label for="j-date">Date</label>
              <input type="date" id="j-date" required />
            </div>
          </div>

          <div class="dough-snapshot" id="j-dough-snapshot">
            <span class="snapshot-label">Dough Snapshot:</span>
            <span class="snapshot-empty">Calculate a recipe first to capture dough settings</span>
          </div>

          <div class="journal-form-grid">
            <div class="form-group">
              <label for="j-bake-temp">Bake Temp (&deg;F)</label>
              <input type="number" id="j-bake-temp" min="300" max="1000" />
            </div>
            <div class="form-group">
              <label for="j-bake-time">Bake Time</label>
              <input type="text" inputmode="numeric" id="j-bake-time" placeholder="e.g. 8–12" />
            </div>
            <div class="form-group">
              <label for="j-oven-type">Oven Type</label>
              <select id="j-oven-type">
                <!-- Populated by populateOvenSelect() -->
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Rating</label>
            <div class="star-rating" id="j-star-rating">
              <button type="button" class="star" data-value="1" aria-label="1 star">&#9733;</button>
              <button type="button" class="star" data-value="2" aria-label="2 stars">&#9733;</button>
              <button type="button" class="star" data-value="3" aria-label="3 stars">&#9733;</button>
              <button type="button" class="star" data-value="4" aria-label="4 stars">&#9733;</button>
              <button type="button" class="star" data-value="5" aria-label="5 stars">&#9733;</button>
            </div>
          </div>

          <div class="form-group">
            <label for="j-notes">Notes</label>
            <textarea id="j-notes" rows="3" placeholder="How did it turn out? What would you change?"></textarea>
          </div>

          <div class="form-group">
            <label>Photos <span class="photo-count-hint">(up to 4)</span></label>
            <input type="file" id="j-photo-input" accept="image/*" multiple class="sr-only" />
            <div class="photo-grid" id="j-photo-grid">
              <!-- Thumbnails rendered by JS -->
            </div>
            <label for="j-photo-input" class="photo-add-btn" id="j-photo-add-btn">
              <span class="photo-icon">&#128247;</span>
              <span>Add Photos</span>
            </label>
          </div>

          <div class="journal-form-actions">
            <button type="submit" class="btn-save-entry">Save Entry</button>
            <button type="button" class="btn-cancel-entry" id="btn-cancel-entry">Cancel</button>
          </div>
        </form>
      </div>

      <button class="btn-new-entry" id="btn-new-entry">+ Log a Bake</button>

      <div class="journal-entries" id="journal-entries"></div>

      <div class="journal-comparison hidden" id="journal-comparison"></div>
    </section>
  </main>

  <!-- Journal Detail Modal -->
  <div class="modal-overlay hidden" id="journal-detail-modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Mobile Tab Bar -->
  <nav class="mobile-tab-bar">
    <a href="calculator.html" class="tab-item" data-page="calculator">
      <span class="tab-icon">&#127829;</span>
      <span class="tab-label">Make</span>
    </a>
    <a href="schedule.html" class="tab-item" data-page="schedule">
      <span class="tab-icon">&#128197;</span>
      <span class="tab-label">Schedule</span>
      <span class="schedule-badge hidden"></span>
    </a>
    <a href="journal.html" class="tab-item" data-page="journal">
      <span class="tab-icon">&#128211;</span>
      <span class="tab-label">Journal</span>
    </a>
    <a href="learn.html" class="tab-item" data-page="learn">
      <span class="tab-icon">&#128214;</span>
      <span class="tab-label">Learn</span>
    </a>
    <a href="kitchen.html" class="tab-item" data-page="kitchen">
      <span class="tab-icon">&#9881;&#65039;</span>
      <span class="tab-label">My Kitchen</span>
    </a>
  </nav>

  <footer>
    <img src="assets/logos/logo-horizontal.svg" alt="The Pie Lab" class="footer-logo" />
    <p>&copy; 2026 The Pie Lab. All rights reserved.</p>
  </footer>

  <!-- Scripts: Capacitor init first, then data files, then shared nav, then page features -->
  <script src="js/capacitor-init.js"></script>
  <script src="recipes.js?v=5"></script>
  <script src="journal.js?v=3"></script>
  <script src="js/nav.js?v=3"></script>
  <script src="js/user-profile.js?v=3"></script>
  <script src="js/journal-ui.js?v=9"></script>
</body>
</html>
