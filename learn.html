  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="assets/logos/favicon-32.svg" />
    <link rel="apple-touch-icon" href="assets/logos/logo-monogram-512.svg" />
    <meta
      name="description"
      content="Pizza recipe calculator, dough scheduler, and baking journal."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="The Pie Lab — Pizza Toolkit" />
    <meta property="og:description" content="Pizza recipe calculator, dough scheduler, and baking journal for home bakers." />
    <meta property="og:image" content="assets/logos/logo-stacked.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Pie Lab" />
    <meta name="twitter:description" content="Pizza recipe calculator, dough scheduler, and baking journal." />
    <meta name="twitter:image" content="assets/logos/logo-stacked.svg" />
    <meta name="theme-color" content="#c0392b" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'nonce-PIELAB_NONCE'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.revenuecat.com;"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script nonce="PIELAB_NONCE">
      (function () {
        var t = localStorage.getItem('pielab-theme'),
          d = t === 'dark' || (!t && matchMedia('(prefers-color-scheme:dark)').matches);
        if (d) {
          document.documentElement.dataset.theme = 'dark';
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.content = '#1a1a1a';
        }
      })();
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="learn">
    <!-- Shared Navigation -->
    <header class="site-header">
      <nav class="site-nav">
        <a href="index.html" class="nav-logo">
          <img src="assets/logos/logo-horizontal.svg" alt="The Pie Lab" />
        </a>
        <div class="nav-links">
          <a href="calculator.html" class="nav-link" data-page="calculator">Make</a>
          <a href="schedule.html" class="nav-link" data-page="schedule">
            Schedule
            <span class="schedule-badge hidden"></span>
          </a>
          <a href="journal.html" class="nav-link" data-page="journal">Journal</a>
          <a href="learn.html" class="nav-link" data-page="learn">Tools</a>
          <a href="kitchen.html" class="nav-link" data-page="kitchen">My Kitchen</a>
        </div>
      </nav>
    </header>

    <main>
      <!-- Pizza Toolkit (includes Knowledge Hub + Tools) -->
      <section class="pizza-toolkit">
        <h2>Pizza Toolkit</h2>
        <nav class="toolkit-tabs" role="tablist">
          <!-- Knowledge Hub tabs -->
          <button
            class="toolkit-tab active"
            role="tab"
            aria-selected="true"
            aria-controls="tool-styles"
            data-tool="styles"
          >
            Style Library
          </button>
          <button
            class="toolkit-tab"
            role="tab"
            aria-selected="false"
            aria-controls="tool-cheese"
            data-tool="cheese"
          >
            Cheese &amp; Sauce
          </button>
          <button
            class="toolkit-tab"
            role="tab"
            aria-selected="false"
            aria-controls="tool-flour"
            data-tool="flour"
          >
            Flour &amp; Yeast
          </button>
          <button
            class="toolkit-tab"
            role="tab"
            aria-selected="false"
            aria-controls="tool-fermentation"
            data-tool="fermentation"
          >
            Fermentation
          </button>
          <!-- Tool tabs -->
          <button
            class="toolkit-tab"
            role="tab"
            aria-selected="false"
            aria-controls="tool-hydration"
            data-tool="hydration"
          >
            Hydration Guide <span class="premium-tag">PRO</span>
          </button>
          <button
            class="toolkit-tab"
            role="tab"
            aria-selected="false"
            aria-controls="tool-oven"
            data-tool="oven"
          >
            Oven Guide
          </button>
          <button
            class="toolkit-tab"
            role="tab"
            aria-selected="false"
            aria-controls="tool-troubleshoot"
            data-tool="troubleshoot"
          >
            Troubleshooting <span class="premium-tag">PRO</span>
          </button>
          <button
            class="toolkit-tab"
            role="tab"
            aria-selected="false"
            aria-controls="tool-compare"
            data-tool="compare"
          >
            Compare <span class="premium-tag">PRO</span>
          </button>
          <button
            class="toolkit-tab"
            role="tab"
            aria-selected="false"
            aria-controls="tool-ddt"
            data-tool="ddt"
          >
            DDT Calculator <span class="premium-tag">PRO</span>
          </button>
          <button
            class="toolkit-tab"
            role="tab"
            aria-selected="false"
            aria-controls="tool-volume"
            data-tool="volume"
          >
            Volume Conversion
          </button>
        </nav>
        <div class="toolkit-panels">
          <!-- Knowledge Hub panels -->
          <div class="toolkit-panel active" id="tool-styles" role="tabpanel"></div>
          <div class="toolkit-panel" id="tool-cheese" role="tabpanel"></div>
          <div class="toolkit-panel" id="tool-flour" role="tabpanel"></div>
          <div class="toolkit-panel" id="tool-fermentation" role="tabpanel"></div>
          <!-- Tool panels -->
          <div class="toolkit-panel" id="tool-hydration" role="tabpanel"></div>
          <div class="toolkit-panel" id="tool-oven" role="tabpanel"></div>
          <div class="toolkit-panel" id="tool-troubleshoot" role="tabpanel"></div>
          <div class="toolkit-panel" id="tool-compare" role="tabpanel"></div>
          <div class="toolkit-panel" id="tool-ddt" role="tabpanel"></div>
          <div class="toolkit-panel" id="tool-volume" role="tabpanel"></div>
        </div>
      </section>
    </main>

    <!-- Mobile Tab Bar -->
    <nav class="mobile-tab-bar">
      <a href="calculator.html" class="tab-item" data-page="calculator">
        <span class="tab-icon">&#127829;</span>
        <span class="tab-label">Make</span>
      </a>
      <a href="schedule.html" class="tab-item" data-page="schedule">
        <span class="tab-icon">&#128197;</span>
        <span class="tab-label">Schedule</span>
        <span class="schedule-badge hidden"></span>
      </a>
      <a href="journal.html" class="tab-item" data-page="journal">
        <span class="tab-icon">&#128211;</span>
        <span class="tab-label">Journal</span>
      </a>
      <a href="learn.html" class="tab-item" data-page="learn">
        <span class="tab-icon">&#128214;</span>
        <span class="tab-label">Tools</span>
      </a>
      <a href="kitchen.html" class="tab-item" data-page="kitchen">
        <span class="tab-icon">&#9881;&#65039;</span>
        <span class="tab-label">My Kitchen</span>
      </a>
    </nav>

    <footer>
      <img src="assets/logos/logo-horizontal.svg" alt="The Pie Lab" class="footer-logo" />
      <p class="footer-legal-links">
        <a href="legal.html#privacy">Privacy</a>
        <span class="footer-sep">&middot;</span>
        <a href="legal.html#terms">Terms</a>
        <span class="footer-sep">&middot;</span>
        <a href="legal.html#refund">Refunds</a>
      </p>
      <p>&copy; 2026 The Pie Lab. All rights reserved.</p>
    </footer>

    <script type="module" src="js/pages/learn-page.js"></script>
  </body>
</html>
