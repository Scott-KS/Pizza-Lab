<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Pie Lab — Perfect Pizza Recipe Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Pizza Carousel Hero -->
  <section class="pizza-hero">
    <div class="carousel-track">
      <div class="carousel-slide active" style="background-image: url('https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=1600&q=80')">
        <span class="slide-label">Neapolitan</span>
      </div>
      <div class="carousel-slide" style="background-image: url('https://images.unsplash.com/photo-1513104890138-7c749659a591?w=1600&q=80')">
        <span class="slide-label">New York</span>
      </div>
      <div class="carousel-slide" style="background-image: url('https://images.unsplash.com/photo-1628840042765-356cda07504e?w=1600&q=80')">
        <span class="slide-label">Grandma</span>
      </div>
      <div class="carousel-slide" style="background-image: url('https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=1600&q=80')">
        <span class="slide-label">Chicago Tavern</span>
      </div>
      <div class="carousel-slide" style="background-image: url('https://images.unsplash.com/photo-1571997478779-2adcbbe9ab2f?w=1600&q=80')">
        <span class="slide-label">Sicilian</span>
      </div>
    </div>
    <div class="carousel-overlay"></div>
    <div class="carousel-content">
      <h1 class="hero-title">The Pie Lab</h1>
      <p class="hero-subtitle">Every style. Every crust. Every craving.</p>
    </div>
    <div class="carousel-dots">
      <button class="dot active" data-index="0"></button>
      <button class="dot" data-index="1"></button>
      <button class="dot" data-index="2"></button>
      <button class="dot" data-index="3"></button>
      <button class="dot" data-index="4"></button>
    </div>
    <button class="carousel-arrow prev" aria-label="Previous">&#8592;</button>
    <button class="carousel-arrow next" aria-label="Next">&#8594;</button>
  </section>

  <main>
    <section class="calculator-card">
      <h2>Build Your Recipe</h2>

      <form id="pizza-form">
        <div class="form-group">
          <label for="pizza-type">Pizza Style</label>
          <select id="pizza-type" required>
            <option value="" disabled selected>Select a style…</option>
            <option value="neapolitan">Neapolitan</option>
            <option value="new-york">New York</option>
            <option value="chicago-tavern">Chicago Tavern</option>
            <option value="detroit">Detroit Deep Dish</option>
            <option value="sicilian">Sicilian</option>
            <option value="grandma">Grandma</option>
            <option value="thin-crust">Thin &amp; Crispy</option>
            <option value="pan">Pan Pizza</option>
          </select>
        </div>

        <div class="form-group">
          <label for="pizza-size">Pizza Size</label>
          <select id="pizza-size" required>
            <option value="" disabled selected>Select a style first</option>
          </select>
        </div>

        <div class="form-group">
          <label for="num-pizzas">Number of Pizzas</label>
          <input type="number" id="num-pizzas" min="1" max="50" value="2" required />
        </div>

        <div class="form-group">
          <label for="oven-temp">Max Oven Temperature</label>
          <div class="temp-input-row">
            <input type="number" id="oven-temp" min="300" max="1000" value="500" required />
            <div class="unit-toggle">
              <button type="button" class="unit-btn active" data-unit="F">°F</button>
              <button type="button" class="unit-btn" data-unit="C">°C</button>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-calculate">Calculate Recipe</button>
      </form>
    </section>

    <section id="results" class="results-card hidden">
      <div class="results-header">
        <h2 id="result-title"></h2>
        <span class="badge" id="result-badge"></span>
      </div>

      <div class="results-grid">
        <div class="result-section">
          <h3>Dough</h3>
          <table id="dough-table" class="three-col">
            <thead>
              <tr><th>Ingredient</th><th>Grams</th><th>% of Flour</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="result-section">
          <h3>Sauce</h3>
          <table id="sauce-table">
            <thead>
              <tr><th>Ingredient</th><th>Grams</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="result-section">
          <h3>Toppings</h3>
          <table id="toppings-table">
            <thead>
              <tr><th>Ingredient</th><th>Grams</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div class="instructions-section">
        <h3>Baking Instructions</h3>
        <div id="baking-instructions"></div>
      </div>

      <div class="tips-section">
        <h3>Pro Tips</h3>
        <ul id="pro-tips"></ul>
      </div>

      <div class="results-actions">
        <button class="btn-print" onclick="window.print()">Print Recipe</button>
        <button class="btn-reset" onclick="document.getElementById('results').classList.add('hidden'); window.scrollTo({top:0,behavior:'smooth'});">New Recipe</button>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 The Pie Lab. All rights reserved.</p>
  </footer>

  <script src="recipes.js"></script>
  <script src="app.js"></script>
</body>
</html>
