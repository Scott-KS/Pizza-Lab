<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Pie Lab — Make</title>
  <link rel="icon" type="image/svg+xml" href="assets/logos/favicon-32.svg">
  <link rel="apple-touch-icon" href="assets/logos/logo-monogram-512.svg">
  <meta property="og:image" content="assets/logos/logo-stacked.svg">
  <meta name="description" content="Pizza recipe calculator, dough scheduler, and baking journal.">
  <meta name="theme-color" content="#c0392b">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem("pielab-theme"),d=t==="dark"||(!t&&matchMedia("(prefers-color-scheme:dark)").matches);if(d){document.documentElement.dataset.theme="dark";var m=document.querySelector('meta[name="theme-color"]');if(m)m.content="#1a1a1a";}})()</script>
  <link rel="stylesheet" href="style.css?v=8" />
</head>
<body data-page="welcome" class="splash-page">

  <!-- Pizza Carousel Hero -->
  <section class="pizza-hero">
    <div class="carousel-track">
      <div class="carousel-slide active" data-style="neapolitan" style="background-image: url('Images/Neapolitan.webp')">
        <span class="slide-label">Neapolitan</span>
      </div>
      <div class="carousel-slide" data-style="new-york" style="background-image: url('Images/New-York.webp')">
        <span class="slide-label">New York</span>
      </div>
      <div class="carousel-slide" data-style="grandma" style="background-image: url('Images/Grandma.webp')">
        <span class="slide-label">Grandma</span>
      </div>
      <div class="carousel-slide" data-style="chicago-tavern" style="background-image: url('Images/Chicago-Tavern.webp')">
        <span class="slide-label">Chicago Tavern</span>
      </div>
      <div class="carousel-slide" data-style="sicilian" style="background-image: url('Images/Sicilian.webp')">
        <span class="slide-label">Sicilian</span>
      </div>
      <div class="carousel-slide" data-style="ohio-valley" style="background-image: url('Images/Ohio-Valley.webp')">
        <span class="slide-label">Ohio Valley</span>
      </div>
    </div>
    <div class="carousel-overlay"></div>
    <div class="carousel-content">
      <img src="assets/logos/logo-transparent.svg" alt="The Pie Lab" class="hero-logo" />
      <p class="hero-subtitle">Every style. Every crust. Every craving.</p>
      <a href="calculator.html" class="btn-start-baking">Start Baking</a>
    </div>
    <div class="carousel-dots">
      <button class="dot active" data-index="0"></button>
      <button class="dot" data-index="1"></button>
      <button class="dot" data-index="2"></button>
      <button class="dot" data-index="3"></button>
      <button class="dot" data-index="4"></button>
      <button class="dot" data-index="5"></button>
    </div>
    <button class="carousel-arrow prev" aria-label="Previous">&#8592;</button>
    <button class="carousel-arrow next" aria-label="Next">&#8594;</button>
  </section>

  <script src="js/capacitor-init.js"></script>
  <script src="js/carousel.js"></script>
  <script>if("serviceWorker"in navigator)window.addEventListener("load",()=>{navigator.serviceWorker.register("/sw.js").catch(()=>{})})</script>
</body>
</html>
